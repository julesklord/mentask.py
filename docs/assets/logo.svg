<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Depth -->
  <rect width="200" height="200" rx="40" fill="#1E293B"/>
  
  <!-- Modular Brain Grid (2x2) -->
  <!-- m -->
  <rect x="50" y="50" width="45" height="45" rx="8" fill="#6366F1"/>
  <!-- t -->
  <rect x="105" y="50" width="45" height="45" rx="8" fill="#6366F1" fill-opacity="0.8"/>
  <!-- a -->
  <rect x="50" y="105" width="45" height="45" rx="8" fill="#6366F1" fill-opacity="0.6"/>
  <!-- k -->
  <rect x="105" y="105" width="45" height="45" rx="8" fill="#6366F1" fill-opacity="0.4"/>
  
  <!-- Connections (Mint) -->
  <path d="M95 72.5 H105" stroke="#10B981" stroke-width="4" stroke-linecap="round"/>
  <path d="M72.5 95 V105" stroke="#10B981" stroke-width="4" stroke-linecap="round"/>
  <path d="M127.5 95 V105" stroke="#10B981" stroke-width="4" stroke-linecap="round"/>
  <path d="M95 127.5 H105" stroke="#10B981" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Central Thinking Dot (Gold) -->
  <circle cx="100" cy="100" r="12" fill="#FBBF24">
    <animate attributeName="r" values="10;14;10" dur="2s" repeatCount="indefinite" />
    <animate attributeName="fill-opacity" values="1;0.7;1" dur="2s" repeatCount="indefinite" />
  </circle>
</svg>

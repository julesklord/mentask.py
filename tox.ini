# tox.ini — multi-environment test runner for PyGemAi
# Run with: tox   (inside an activated venv with tox installed)
#
# This config validates the test suite across Python 3.10–3.13 and runs
# the ruff linter in a dedicated pass. Older Pythons (3.8/3.9) are not
# included because tox needs them installed on the host to create envs;
# add them to the list if your CI runner has them available.

[tox]
envlist = py310, py311, py312, py313, lint
skip_missing_interpreters = true

[testenv]
deps =
    pytest>=8.0.0
    google-genai>=0.2.0
    rich>=13.0.0
commands =
    pytest tests/ -v {posargs}

[testenv:lint]
deps =
    ruff>=0.4.0
commands =
    ruff check src/ tests/

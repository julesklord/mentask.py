name: Build and Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            separator: ":"
            ext: ""
          - os: windows-latest
            separator: ";"
            ext: ".exe"
          - os: macos-latest
            separator: ":"
            ext: ""

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install .
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --add-data "src/mentask/locales${{ matrix.separator }}mentask/locales" --name mentask run.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mentask-${{ matrix.os }}
          path: dist/mentask${{ matrix.ext }}

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/mentask${{ matrix.ext }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
